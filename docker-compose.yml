version: '3.8'

services:
  qasql-api:
    build: .
    container_name: qasql-api
    ports:
      - "9001:8000"
    volumes:
      - ./data:/data
      - ./qasql_api_output:/app/qasql_api_output
    environment:
      - QASQL_DATABASE_URL=postgresql+psycopg://qasql:qasql@postgres:5432/qasql_platform
      - QASQL_SECRET_KEY=${QASQL_SECRET_KEY:-change-this-secret-key}
      - QASQL_LLM_PROVIDER=anthropic
      - QASQL_LLM_MODEL=claude-sonnet-4-5-20250929
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Ollama commented out - using Anthropic SDK by default
      # - QASQL_LLM_PROVIDER=ollama
      # - QASQL_LLM_MODEL=llama3.2:3b
      # - QASQL_OLLAMA_URL=http://ollama:11434
    depends_on:
      - postgres
      # - ollama  # Commented out
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: qasql-postgres
    ports:
      - "9002:5432"
    environment:
      - POSTGRES_USER=qasql
      - POSTGRES_PASSWORD=qasql
      - POSTGRES_DB=qasql_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Ollama service commented out - using Anthropic SDK by default
  # ollama:
  #   image: ollama/ollama
  #   container_name: qasql-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped

volumes:
  postgres_data:
  # ollama_data:  # Commented out
