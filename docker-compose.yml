version: '3.8'

services:
  qasql-api:
    build: .
    container_name: qasql-api
    ports:
      - "9001:8000"
    volumes:
      - ./data:/data
      - ./qasql_api_output:/app/qasql_api_output
    environment:
      - QASQL_DATABASE_URL=postgresql+psycopg://qasql:qasql@postgres:5432/qasql_platform
      - QASQL_SECRET_KEY=${QASQL_SECRET_KEY:-change-this-secret-key}
      - QASQL_LLM_PROVIDER=anthropic
      - QASQL_LLM_MODEL=claude-sonnet-4-5-20250929
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Set this if behind HTTPS reverse proxy (e.g., /api or leave empty)
      - API_ROOT_PATH=${API_ROOT_PATH:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:15
    container_name: qasql-postgres
    ports:
      - "9002:5432"
    environment:
      - POSTGRES_USER=qasql
      - POSTGRES_PASSWORD=qasql
      - POSTGRES_DB=qasql_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qasql -d qasql_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama service commented out - using Anthropic SDK by default
  # ollama:
  #   image: ollama/ollama
  #   container_name: qasql-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped

volumes:
  postgres_data:
  # ollama_data:  # Commented out
